<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>활성화 및 초대 전송</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --line: rgba(255, 255, 255, 0.14);
        --accent: #7c3aed;
        --danger: #ef4444;
        --ok: #22c55e;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue",
          sans-serif;
        background: radial-gradient(1200px 800px at 20% 10%, rgba(124, 58, 237, 0.35), transparent 55%),
          radial-gradient(1000px 700px at 80% 20%, rgba(59, 130, 246, 0.25), transparent 55%), var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .wrap {
        width: 100%;
        max-width: 720px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }
      form {
        display: grid;
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input {
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        outline: none;
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        font-size: 14px;
      }
      input:focus {
        border-color: rgba(124, 58, 237, 0.65);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
      button {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(124, 58, 237, 0.5);
        background: linear-gradient(180deg, rgba(124, 58, 237, 0.95), rgba(124, 58, 237, 0.75));
        color: white;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .status {
        margin-top: 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px;
        font-size: 13px;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .status.ok {
        border-color: rgba(34, 197, 94, 0.35);
        color: rgba(203, 255, 224, 0.92);
      }
      .status.err {
        border-color: rgba(239, 68, 68, 0.35);
        color: rgba(255, 212, 212, 0.92);
      }
      .footer {
        margin-top: 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>활성화 코드 입력 및 자동 초대</h1>
        <p>
          <b>활성화 코드</b>와 <b>이메일</b>을 입력하세요. 시스템이 멤버 초대 API를 호출하고 (이메일, 코드, 시간) 로그를 Google
          Sheet에 기록합니다.
        </p>

        <form id="f">
          <div class="row">
            <label>
              활성화 코드
              <input name="code" placeholder="예: ABC123" autocomplete="one-time-code" required />
            </label>
            <label>
              이메일
              <input name="email" placeholder="email@example.com" autocomplete="email" type="email" required />
            </label>
          </div>
          <button id="btn" type="submit">활성화</button>
        </form>

        <div id="status" class="status" style="display: none"></div>
        <div class="footer">엔드포인트: <code>POST /activate</code></div>
      </div>
    </div>

    <script>
      const f = document.getElementById("f");
      const btn = document.getElementById("btn");
      const statusEl = document.getElementById("status");

      function showStatus(kind, text) {
        statusEl.style.display = "block";
        statusEl.className = `status ${kind}`;
        statusEl.textContent = text;
      }

      f.addEventListener("submit", async (e) => {
        e.preventDefault();
        btn.disabled = true;
        statusEl.style.display = "none";

        const form = new FormData(f);
        const payload = {
          code: String(form.get("code") || "").trim(),
          email: String(form.get("email") || "").trim(),
        };

        try {
          const r = await fetch("/activate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await r.json().catch(() => ({}));
          if (!r.ok || !data.success) {
            showStatus("err", data.error || `HTTP 오류 ${r.status}`);
            return;
          }
          showStatus("ok", `성공했습니다.\nactivatedAt: ${data.activatedAt || ""}`);
        } catch (err) {
          showStatus("err", err?.message || String(err));
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
